name: lexo_player
description: An interactive video player optimized for language acquisition with dual-tier dictionary lookups.
publish_to: 'none'
version: 1.0.0-beta.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Media Engine
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # State Management
  flutter_riverpod: ^2.6.1

  # Database Engine
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.28

  # Parsing & NLP
  porter_2_stemmer: ^3.0.2
  charset_converter: ^2.2.0

  # UI
  flutter_widget_from_html: ^0.15.2

  # Networking & Downloads
  dio: ^5.7.0

  # Archive extraction
  archive: ^4.0.2

  # Local preferences (download tracking, active selections)
  shared_preferences: ^2.3.4

  # Cryptography (MD5 checksum verification)
  crypto: ^3.0.6

  # Utilities
  path_provider: ^2.1.5
  path: ^1.9.0
  file_picker: ^8.1.6
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  macos:
    generate: true
  windows:
    generate: true
    icon_size: 48
  image_path: "assests/icon/icon.png"
